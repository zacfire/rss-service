name: Daily Digest

on:
  schedule:
    # 提前1小时执行，等待到目标时间再发送
    # 北京时间 06:00 执行 → 07:00 发送 (UTC 22:00 前一天)
    - cron: '0 22 * * *'
    # 北京时间 07:00 执行 → 08:00 发送 (UTC 23:00 前一天)
    - cron: '0 23 * * *'
    # 北京时间 08:00 执行 → 09:00 发送 (UTC 00:00)
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      push_time:
        description: '推送时段 (07:00/08:00/09:00，留空自动检测)'
        required: false
        default: ''
      skip_wait:
        description: '跳过等待，立即发送（用于测试）'
        required: false
        type: boolean
        default: false

jobs:
  generate-and-send:
    runs-on: ubuntu-latest
    timeout-minutes: 120  # 2小时超时，正常运行应在1.5小时内完成

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Install Node dependencies
        run: npm ci

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Generate and send digest
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          SKIP_WAIT: ${{ github.event.inputs.skip_wait }}
        run: |
          echo "🚀 开始生成今日简报..."
          DATE=$(TZ='Asia/Shanghai' date +%Y-%m-%d)
          PUSH_TIME="${{ github.event.inputs.push_time }}"
          echo "日期: $DATE"
          echo "时段: ${PUSH_TIME:-自动检测}"
          echo "跳过等待: ${SKIP_WAIT:-false}"

          # 运行 Pipeline 并发送邮件
          if [ -n "$PUSH_TIME" ]; then
            npm run generate-digest -- $DATE $PUSH_TIME
          else
            npm run generate-digest -- $DATE
          fi

      - name: Notify on failure
        if: failure()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          DATE=$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          
          curl -X POST 'https://api.resend.com/emails' \
            -H "Authorization: Bearer $RESEND_API_KEY" \
            -H 'Content-Type: application/json' \
            -d "{
              \"from\": \"RSS AI Digest <digest@emmmme.com>\",
              \"to\": [\"hellozacchen@gmail.com\"],
              \"subject\": \"⚠️ RSS 简报推送失败 - $DATE\",
              \"html\": \"<h2>RSS 简报推送任务失败</h2><p>时间: $DATE</p><p>请查看详细日志: <a href='$RUN_URL'>GitHub Actions</a></p>\"
            }"
